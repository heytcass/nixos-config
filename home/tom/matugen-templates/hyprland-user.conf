# Hyprland user-level color configuration generated by matugen
# This file contains Material You colors for user-specific Hyprland theming

# Material You color variables for user applications
$user_primary = {{colors.primary.hex}}
$user_secondary = {{colors.secondary.hex}}
$user_tertiary = {{colors.tertiary.hex}}
$user_surface = {{colors.surface.hex}}
$user_background = {{colors.background.hex}}

# Custom Claude colors
$user_claude_orange = {{colors.custom.claude_orange.hex}}
$user_claude_secondary = {{colors.custom.claude_secondary.hex}}
$user_claude_tertiary = {{colors.custom.claude_tertiary.hex}}

# User-specific window rules with Material You colors
windowrulev2 = bordercolor rgb({{colors.primary.hex_stripped}}),class:(firefox)
windowrulev2 = bordercolor rgb({{colors.secondary.hex_stripped}}),class:(code)
windowrulev2 = bordercolor rgb({{colors.tertiary.hex_stripped}}),class:(discord)

# Workspace-specific theming
workspace = 1, bordercolor:rgb({{colors.primary.hex_stripped}})
workspace = 2, bordercolor:rgb({{colors.secondary.hex_stripped}})
workspace = 3, bordercolor:rgb({{colors.tertiary.hex_stripped}})