name: "NixOS Build & Test"

on:
  push:
    branches: [main]
    paths: ['**.nix', 'flake.lock', '.github/workflows/**']
  pull_request:
    branches: [main]
    paths: ['**.nix', 'flake.lock', '.github/workflows/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        system: [gti, transporter]

    name: Build ${{ matrix.system }}
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            substitute = true
            max-jobs = auto
            cores = 2

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      - name: Build NixOS configuration
        run: |
          echo "Building NixOS configuration for ${{ matrix.system }}..."
          nix build '.#nixosConfigurations.${{ matrix.system }}.config.system.build.toplevel' \
            --print-build-logs \
            --show-trace \
            --fallback
          echo "✅ ${{ matrix.system }} built successfully"

      - name: Verify build output
        run: |
          if [ -L result ]; then
            echo "✅ Build result exists"
            ls -la result/
          else
            echo "❌ No build result found"
            exit 1
          fi

      - name: Run flake check
        run: |
          echo "Running flake check..."
          nix flake check --show-trace
          echo "✅ Flake check passed"

  summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "## 🚀 NixOS Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ **All systems built successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **gti**: Dell XPS 13 9370 (Hyprland)" >> $GITHUB_STEP_SUMMARY
            echo "- **transporter**: Dell Latitude 7280 (Niri)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some builds failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the individual job logs for details." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow**: Modern NixOS CI/CD using cachix/install-nix-action@v31" >> $GITHUB_STEP_SUMMARY
