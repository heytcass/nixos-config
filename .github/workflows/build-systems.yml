name: Build NixOS Systems

on:
  push:
    branches: [ main, refactor/* ]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - '**.nix'
      - '.github/workflows/build-systems.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - '**.nix'
      - '.github/workflows/build-systems.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    strategy:
      fail-fast: false
      matrix:
        system: [gti, transporter, iso]
        include:
          - system: gti
            type: workstation
            description: "Dell XPS 13 9370 - Gaming workstation"
          - system: transporter
            type: laptop
            description: "Dell Latitude 7280 - Portable laptop"
          - system: iso
            type: iso
            description: "Live ISO for installation/recovery"
    
    name: Build ${{ matrix.system }} (${{ matrix.type }})
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Maximize build space
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: cleave
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          logger: pretty
          log-directives: nix_installer=trace
          backtrace: full
      
      - name: Setup FlakeHub Cache
        uses: DeterminateSystems/flakehub-cache-action@main
      
      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true
      
      - name: Check flake
        run: |
          echo "Checking flake..."
          nix flake check --show-trace
      
      - name: Build ${{ matrix.system }}
        timeout-minutes: 60
        run: |
          echo "Building ${{ matrix.description }}..."
          echo "System: ${{ matrix.system }}"
          echo "Type: ${{ matrix.type }}"
          
          if [ "${{ matrix.system }}" = "iso" ]; then
            # Build ISO image
            echo "Building ISO image..."
            nix build .#nixosConfigurations.iso.config.system.build.isoImage -L --show-trace
            
            # Check ISO output
            ISO_PATH=$(find result -name "*.iso" | head -1)
            if [ -n "$ISO_PATH" ]; then
              echo "✅ ISO built successfully: $ISO_PATH"
              ISO_SIZE=$(du -h "$ISO_PATH" | cut -f1)
              echo "📦 ISO size: $ISO_SIZE"
              echo "iso_size=$ISO_SIZE" >> $GITHUB_ENV
            else
              echo "❌ No ISO file found in result"
              exit 1
            fi
          else
            # Build system configuration
            echo "Building system configuration..."
            nix build .#nixosConfigurations.${{ matrix.system }}.config.system.build.toplevel -L --show-trace
            echo "✅ System built successfully"
          fi
      
      - name: Build Home Manager configuration
        if: matrix.type != 'iso'
        run: |
          echo "Building Home Manager configuration for ${{ matrix.system }}..."
          nix build .#homeConfigurations."tom@${{ matrix.system }}" -L --show-trace
          echo "✅ Home Manager configuration built successfully"
      
      - name: Test development shell
        run: |
          echo "Testing development shell..."
          nix develop -c echo "Development shell works!"
          echo "✅ Development shell tested successfully"
      
      - name: Generate build summary
        run: |
          echo "## Build Summary for ${{ matrix.system }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**System**: ${{ matrix.description }}" >> $GITHUB_STEP_SUMMARY
          echo "**Type**: ${{ matrix.type }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ matrix.system }}" = "iso" ]; then
            echo "**ISO Size**: ${{ env.iso_size }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All configurations built successfully using the new mixin system!" >> $GITHUB_STEP_SUMMARY

  # Summary job that runs after all builds complete
  build-summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Build Status Summary
        run: |
          echo "## 🚀 Build Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| System | Type | Status |" >> $GITHUB_STEP_SUMMARY  
          echo "|--------|------|--------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "| gti | workstation | ✅ Success |" >> $GITHUB_STEP_SUMMARY
            echo "| transporter | laptop | ✅ Success |" >> $GITHUB_STEP_SUMMARY
            echo "| iso | live-iso | ✅ Success |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 **All systems built successfully with the new mixin architecture!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some builds failed. Check individual job logs for details." >> $GITHUB_STEP_SUMMARY
          fi