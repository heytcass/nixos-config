name: Gaming Stack Validation

on:
  push:
    branches: [ main, master ]
    paths:
      - 'hosts/gti/configuration.nix'
      - 'home/tom/home.nix'
      - 'flake.nix'
      - 'flake.lock'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'hosts/gti/configuration.nix'
      - 'home/tom/home.nix'
      - 'flake.nix'
      - 'flake.lock'
  schedule:
    # Run every Friday at 8 AM UTC (check for gaming stack updates)
    - cron: '0 8 * * 5'
  workflow_dispatch: # Allow manual triggering

jobs:
  validate-gaming-stack:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space for gaming validation
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet: carve

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          enable_kvm: true

      - name: Enable gaming-related Nix features
        run: |
          mkdir -p ~/.config/nix
          echo "extra-platforms = x86_64-linux i686-linux" >> ~/.config/nix/nix.conf
          echo "extra-sandbox-paths = /dev/kvm" >> ~/.config/nix/nix.conf

      - name: Build gaming configuration
        run: |
          echo "🎮 Building gaming-focused NixOS configuration..."
          nix build .#nixosConfigurations.gti.config.system.build.toplevel

      - name: Validate Steam configuration
        run: |
          echo "🚂 Validating Steam configuration..."
          
          # Check if Steam is enabled
          STEAM_ENABLED=$(nix eval --expr '.#nixosConfigurations.gti.config.programs.steam.enable' --apply 'x: if x then "true" else "false"')
          echo "Steam enabled: $STEAM_ENABLED"
          
          if [ "$STEAM_ENABLED" = "true" ]; then
            echo "✅ Steam is properly enabled"
            echo "## 🚂 Steam Configuration" >> $GITHUB_STEP_SUMMARY
            echo "- Steam: ✅ Enabled" >> $GITHUB_STEP_SUMMARY
            
            # Check GameScope session
            GAMESCOPE_ENABLED=$(nix eval --expr '.#nixosConfigurations.gti.config.programs.steam.gamescopeSession.enable' --apply 'x: if x then "true" else "false"')
            echo "GameScope session: $GAMESCOPE_ENABLED"
            echo "- GameScope Session: $([ "$GAMESCOPE_ENABLED" = "true" ] && echo '✅' || echo '❌') $GAMESCOPE_ENABLED" >> $GITHUB_STEP_SUMMARY
            
            # Check firewall settings
            REMOTE_PLAY=$(nix eval --expr '.#nixosConfigurations.gti.config.programs.steam.remotePlay.openFirewall' --apply 'x: if x then "true" else "false"')
            DEDICATED_SERVER=$(nix eval --expr '.#nixosConfigurations.gti.config.programs.steam.dedicatedServer.openFirewall' --apply 'x: if x then "true" else "false"')
            LOCAL_TRANSFERS=$(nix eval --expr '.#nixosConfigurations.gti.config.programs.steam.localNetworkGameTransfers.openFirewall' --apply 'x: if x then "true" else "false"')
            
            echo "- Remote Play Firewall: $([ "$REMOTE_PLAY" = "true" ] && echo '✅' || echo '❌') $REMOTE_PLAY" >> $GITHUB_STEP_SUMMARY
            echo "- Dedicated Server Firewall: $([ "$DEDICATED_SERVER" = "true" ] && echo '✅' || echo '❌') $DEDICATED_SERVER" >> $GITHUB_STEP_SUMMARY
            echo "- Local Network Transfers: $([ "$LOCAL_TRANSFERS" = "true" ] && echo '✅' || echo '❌') $LOCAL_TRANSFERS" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Steam is not enabled"
            echo "::error::Steam is not enabled in configuration"
          fi

      - name: Validate GameMode configuration
        run: |
          echo "🎯 Validating GameMode configuration..."
          
          GAMEMODE_ENABLED=$(nix eval --expr '.#nixosConfigurations.gti.config.programs.gamemode.enable' --apply 'x: if x then "true" else "false"')
          echo "GameMode enabled: $GAMEMODE_ENABLED"
          
          echo "## 🎯 GameMode Configuration" >> $GITHUB_STEP_SUMMARY
          if [ "$GAMEMODE_ENABLED" = "true" ]; then
            echo "- GameMode: ✅ Enabled" >> $GITHUB_STEP_SUMMARY
            
            # Check if gamemode package is available in system
            nix eval .#nixosConfigurations.gti.config.system.build.toplevel.drvPath > /dev/null
            if nix-store -qR $(nix build .#nixosConfigurations.gti.config.system.build.toplevel --no-link --print-out-paths) | grep -q gamemode; then
              echo "- GameMode Package: ✅ Available in system" >> $GITHUB_STEP_SUMMARY
            else
              echo "- GameMode Package: ⚠️ Not found in system derivation" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- GameMode: ❌ Not enabled" >> $GITHUB_STEP_SUMMARY
            echo "::error::GameMode is not enabled in configuration"
          fi

      - name: Validate Graphics and Hardware Acceleration
        run: |
          echo "🎨 Validating graphics configuration..."
          
          # Check hardware graphics settings
          GRAPHICS_ENABLED=$(nix eval --expr '.#nixosConfigurations.gti.config.hardware.graphics.enable' --apply 'x: if x then "true" else "false"')
          GRAPHICS_32BIT=$(nix eval --expr '.#nixosConfigurations.gti.config.hardware.graphics.enable32Bit' --apply 'x: if x then "true" else "false"')
          
          echo "## 🎨 Graphics Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Hardware Graphics: $([ "$GRAPHICS_ENABLED" = "true" ] && echo '✅' || echo '❌') $GRAPHICS_ENABLED" >> $GITHUB_STEP_SUMMARY
          echo "- 32-bit Support: $([ "$GRAPHICS_32BIT" = "true" ] && echo '✅' || echo '❌') $GRAPHICS_32BIT" >> $GITHUB_STEP_SUMMARY
          
          # Check for Intel graphics optimization (XPS 13 9370 specific)
          if nix eval .#nixosConfigurations.gti.config.system.build.toplevel.drvPath > /dev/null; then
            SYSTEM_PATH=$(nix build .#nixosConfigurations.gti.config.system.build.toplevel --no-link --print-out-paths)
            if nix-store -qR "$SYSTEM_PATH" | grep -q intel; then
              echo "- Intel Graphics Drivers: ✅ Present" >> $GITHUB_STEP_SUMMARY
            else
              echo "- Intel Graphics Drivers: ⚠️ Not detected" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Validate Gaming Tools in Home Manager
        run: |
          echo "🏠 Validating Home Manager gaming tools..."
          
          # Build home-manager configuration
          nix build .#nixosConfigurations.gti.config.home-manager.users.tom.home.activationPackage
          
          HOME_PATH=$(nix build .#nixosConfigurations.gti.config.home-manager.users.tom.home.activationPackage --no-link --print-out-paths)
          
          echo "## 🏠 Gaming Tools (Home Manager)" >> $GITHUB_STEP_SUMMARY
          
          # Check for ProtonUp-Qt
          if nix-store -qR "$HOME_PATH" | grep -q protonup-qt; then
            echo "- ProtonUp-Qt: ✅ Available" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ProtonUp-Qt: ❌ Missing" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check for Steam environment variables
          STEAM_VARS=$(nix eval --json .#nixosConfigurations.gti.config.home-manager.users.tom.home.sessionVariables 2>/dev/null || echo "{}")
          if echo "$STEAM_VARS" | jq -e '.STEAM_EXTRA_COMPAT_TOOLS_PATHS' > /dev/null; then
            echo "- Steam Compat Tools Path: ✅ Configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Steam Compat Tools Path: ⚠️ Not configured" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for Gaming Performance Environment
        run: |
          echo "⚡ Validating gaming performance environment..."
          
          echo "## ⚡ Performance Environment" >> $GITHUB_STEP_SUMMARY
          
          # Check Wayland optimization
          WAYLAND_VARS=$(nix eval --json .#nixosConfigurations.gti.config.environment.sessionVariables 2>/dev/null || echo "{}")
          
          if echo "$WAYLAND_VARS" | jq -e '.NIXOS_OZONE_WL' > /dev/null; then
            OZONE_VALUE=$(echo "$WAYLAND_VARS" | jq -r '.NIXOS_OZONE_WL')
            echo "- Wayland Ozone: $([ "$OZONE_VALUE" = "1" ] && echo '✅' || echo '⚠️') $OZONE_VALUE" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Wayland Ozone: ❌ Not configured" >> $GITHUB_STEP_SUMMARY
          fi
          
          if echo "$WAYLAND_VARS" | jq -e '.ELECTRON_OZONE_PLATFORM_HINT' > /dev/null; then
            ELECTRON_VALUE=$(echo "$WAYLAND_VARS" | jq -r '.ELECTRON_OZONE_PLATFORM_HINT')
            echo "- Electron Ozone: ✅ $ELECTRON_VALUE" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Electron Ozone: ⚠️ Not configured" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check kernel version (latest for gaming performance)
          KERNEL_PKG=$(nix eval --raw .#nixosConfigurations.gti.config.boot.kernelPackages.kernel.version)
          echo "- Kernel Version: ℹ️ $KERNEL_PKG" >> $GITHUB_STEP_SUMMARY

      - name: Gaming stack summary
        run: |
          echo "## 🎮 Gaming Stack Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Count issues by checking previous outputs
          ISSUES=0
          
          # Steam validation
          STEAM_ENABLED=$(nix eval --expr '.#nixosConfigurations.gti.config.programs.steam.enable' --apply 'x: if x then "true" else "false"')
          [ "$STEAM_ENABLED" != "true" ] && ISSUES=$((ISSUES + 1))
          
          # GameMode validation  
          GAMEMODE_ENABLED=$(nix eval --expr '.#nixosConfigurations.gti.config.programs.gamemode.enable' --apply 'x: if x then "true" else "false"')
          [ "$GAMEMODE_ENABLED" != "true" ] && ISSUES=$((ISSUES + 1))
          
          # Graphics validation
          GRAPHICS_ENABLED=$(nix eval --expr '.#nixosConfigurations.gti.config.hardware.graphics.enable' --apply 'x: if x then "true" else "false"')
          [ "$GRAPHICS_ENABLED" != "true" ] && ISSUES=$((ISSUES + 1))
          
          if [ $ISSUES -eq 0 ]; then
            echo "🎉 **Gaming Stack Status**: All systems operational!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Your Dell XPS 13 9370 is ready for gaming with:" >> $GITHUB_STEP_SUMMARY
            echo "- Steam with GameScope session support" >> $GITHUB_STEP_SUMMARY
            echo "- GameMode for performance optimization" >> $GITHUB_STEP_SUMMARY  
            echo "- Hardware-accelerated graphics" >> $GITHUB_STEP_SUMMARY
            echo "- Wayland compatibility optimizations" >> $GITHUB_STEP_SUMMARY
            echo "- ProtonUp-Qt for Proton management" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Gaming Stack Status**: $ISSUES configuration issues detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Review the detailed sections above for specific issues." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Generate gaming compatibility report
        if: always()
        run: |
          echo "📊 Generating gaming compatibility report..."
          
          {
            echo "# Gaming Compatibility Report"
            echo "Generated: $(date -u)"
            echo ""
            echo "## Configuration Status"
            echo "- Steam: $(nix eval --expr '.#nixosConfigurations.gti.config.programs.steam.enable' --apply 'x: if x then "true" else "false"')"
            echo "- GameMode: $(nix eval --expr '.#nixosConfigurations.gti.config.programs.gamemode.enable' --apply 'x: if x then "true" else "false"')" 
            echo "- Graphics: $(nix eval --expr '.#nixosConfigurations.gti.config.hardware.graphics.enable' --apply 'x: if x then "true" else "false"')"
            echo "- Kernel: $(nix eval --raw .#nixosConfigurations.gti.config.boot.kernelPackages.kernel.version)"
            echo ""
            echo "## Hardware Target"
            echo "- Device: Dell XPS 13 9370"
            echo "- Graphics: Intel UHD Graphics 620"
            echo "- Architecture: x86_64-linux"
          } > gaming-report.txt

      - name: Upload gaming report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gaming-compatibility-report
          path: gaming-report.txt
          retention-days: 30