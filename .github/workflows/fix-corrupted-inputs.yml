name: Fix Corrupted Flake Inputs

on:
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update all inputs'
        required: false
        default: 'false'
        type: boolean

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Identify problematic inputs
        run: |
          echo "Testing each flake input individually..."

          # Test individual inputs
          for input in nixpkgs home-manager nixos-hardware claude-desktop sops-nix disko ghostty hyprland hyprland-plugins niri stylix; do
            echo "Testing input: $input"
            if nix flake metadata "$(nix eval --raw .#inputs.$input.url 2>/dev/null || echo 'failed')" 2>/dev/null; then
              echo "✅ $input - OK"
            else
              echo "❌ $input - CORRUPTED"
              echo "$input" >> corrupted_inputs.txt
            fi
          done

          if [ -f corrupted_inputs.txt ]; then
            echo "Corrupted inputs found:"
            cat corrupted_inputs.txt
          fi

      - name: Remove corrupted ghostty input
        run: |
          echo "Removing ghostty input which is known to cause issues in CI..."

          # Create backup
          cp flake.nix flake.nix.backup

          # Remove ghostty input and any references
          sed -i '/# Ghostty terminal emulator/,+4d' flake.nix
          sed -i '/ghostty/d' flake.nix

          # Update lock file
          nix flake update

          echo "Ghostty input removed"

      - name: Test fixed flake
        run: |
          echo "Testing flake after removing problematic inputs..."
          nix flake check --show-trace
          nix flake show
          echo "✅ Flake check passed"

      - name: Commit fixes if successful
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes needed"
          else
            git add flake.nix flake.lock
            git commit -m "Fix corrupted flake inputs for CI compatibility

            - Remove ghostty input causing store path corruption in CI
            - Update flake.lock to reflect changes

            This is a temporary fix for GitHub Actions reliability.
            Ghostty can be re-added once the upstream CI issues are resolved."

            git push
          fi
