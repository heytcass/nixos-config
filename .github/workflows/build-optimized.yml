name: "NixOS Build (Space Optimized)"

on:
  push:
    branches: [main]
    paths: ['**.nix', 'flake.lock', '.github/workflows/**']
  pull_request:
    branches: [main]
    paths: ['**.nix', 'flake.lock', '.github/workflows/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        system: [gti, transporter]

    name: Build ${{ matrix.system }}
    timeout-minutes: 60

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v2
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Free additional space
        run: |
          echo "=== Before cleanup ==="
          df -h

          # Remove large packages
          sudo apt-get remove -y '^aspnetcore-.*' || true
          sudo apt-get remove -y '^dotnet-.*' || true
          sudo apt-get remove -y azure-cli google-cloud-cli microsoft-edge-stable || true
          sudo apt-get remove -y google-chrome-stable firefox || true
          sudo apt-get remove -y powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get autoclean

          # Clear package caches
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/lib/node_modules

          echo "=== After cleanup ==="
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix (space optimized)
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            substitute = true
            max-jobs = 1
            cores = 1
            keep-outputs = false
            keep-derivations = false

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: nix-community
          skipPush: true

      - name: Configure aggressive garbage collection
        run: |
          # Set up aggressive GC
          sudo mkdir -p /etc/nix
          echo "min-free = $(( 2 * 1024 * 1024 * 1024 ))" | sudo tee -a /etc/nix/nix.conf  # 2GB min free
          echo "max-free = $(( 4 * 1024 * 1024 * 1024 ))" | sudo tee -a /etc/nix/nix.conf  # 4GB max free
          echo "min-free-check-interval = 5" | sudo tee -a /etc/nix/nix.conf

      - name: Build NixOS configuration (space managed)
        run: |
          echo "Building NixOS configuration for ${{ matrix.system }}..."
          echo "Available space before build:"
          df -h

          # Build with space monitoring
          nix build '.#nixosConfigurations.${{ matrix.system }}.config.system.build.toplevel' \
            --print-build-logs \
            --show-trace \
            --fallback \
            --option max-jobs 1 \
            --option cores 1 \
            --option keep-outputs false \
            --option keep-derivations false &

          BUILD_PID=$!

          # Monitor disk space during build
          while kill -0 $BUILD_PID 2>/dev/null; do
            AVAILABLE=$(df / | awk 'NR==2 {print $4}')
            if [ "$AVAILABLE" -lt 1000000 ]; then  # Less than 1GB
              echo "⚠️  Low disk space detected: ${AVAILABLE}KB available"
              echo "Running emergency cleanup..."
              nix-collect-garbage -d || true
              nix store gc || true
              sudo rm -rf /tmp/* || true
            fi
            sleep 30
          done

          wait $BUILD_PID
          BUILD_EXIT=$?

          if [ $BUILD_EXIT -eq 0 ]; then
            echo "✅ ${{ matrix.system }} built successfully"
          else
            echo "❌ Build failed with exit code $BUILD_EXIT"
            echo "Final disk space:"
            df -h
            exit $BUILD_EXIT
          fi

      - name: Verify build output
        run: |
          if [ -L result ]; then
            echo "✅ Build result exists"
            ls -la result/
          else
            echo "❌ No build result found"
            exit 1
          fi

      - name: Final cleanup
        if: always()
        run: |
          echo "Cleaning up to preserve space..."
          nix-collect-garbage -d || true
          nix store gc || true
          rm -f result || true
          echo "Final disk usage:"
          df -h

  summary:
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "## 🚀 NixOS Build Results (Space Optimized)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ **All systems built successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **gti**: Dell XPS 13 9370 (Hyprland)" >> $GITHUB_STEP_SUMMARY
            echo "- **transporter**: Dell Latitude 7280 (Niri)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some builds failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the individual job logs for details." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Optimizations**: Aggressive space management, single-core builds, continuous GC" >> $GITHUB_STEP_SUMMARY
