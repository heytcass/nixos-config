name: Build NixOS ISO (Release)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub release'
        required: false
        default: true
        type: boolean

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Maximize build space for ISO
      uses: wimpysworld/nothing-but-nix@main
      with:
        hatchet-protocol: cleave

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Fetch full history for proper version detection
        fetch-depth: 0

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
      with:
        logger: pretty
        log-directives: nix_installer=trace
        backtrace: full

    - name: Run FlakeHub Cache
      uses: DeterminateSystems/flakehub-cache-action@main

    - name: Set up Cachix
      uses: cachix/cachix-action@v15
      continue-on-error: true
      with:
        name: nix-community
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        skipPush: true

    - name: Build NixOS ISO
      timeout-minutes: 60
      run: |
        echo "Building NixOS ISO..."
        echo "Initial system resources:"
        free -h
        df -h

        # Monitor resources during build
        (while true; do
          echo "$(date): Memory: $(free -h | grep Mem:), Disk: $(df -h /nix | tail -1)"
          sleep 60
        done) &
        MONITOR_PID=$!

        # Build the ISO
        nix build .#nixosConfigurations.iso.config.system.build.isoImage -L --show-trace

        # Stop monitoring
        kill $MONITOR_PID 2>/dev/null || true

        # Find the ISO file
        ISO_PATH=$(find result -name "*.iso" | head -1)
        if [ -z "$ISO_PATH" ]; then
          echo "Error: No ISO file found in result"
          exit 1
        fi

        echo "ISO built successfully: $ISO_PATH"
        echo "iso_path=$ISO_PATH" >> $GITHUB_ENV

        # Get ISO size and info
        ISO_SIZE=$(du -h "$ISO_PATH" | cut -f1)
        echo "ISO size: $ISO_SIZE"
        echo "iso_size=$ISO_SIZE" >> $GITHUB_ENV

        # Copy ISO to workspace with predictable name
        cp "$ISO_PATH" "nixos-tom-config-$(date +%Y%m%d).iso"
        echo "iso_filename=nixos-tom-config-$(date +%Y%m%d).iso" >> $GITHUB_ENV

    - name: Generate checksums
      run: |
        echo "Generating checksums..."
        sha256sum "${{ env.iso_filename }}" > "${{ env.iso_filename }}.sha256"
        md5sum "${{ env.iso_filename }}" > "${{ env.iso_filename }}.md5"

        echo "Checksums generated:"
        cat "${{ env.iso_filename }}.sha256"
        cat "${{ env.iso_filename }}.md5"

    - name: Generate version info
      id: version
      run: |
        # Generate version based on date and short commit
        VERSION="$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Generated version: $VERSION"

        # Generate release notes
        cat > release_notes.md << EOF
        # NixOS Live ISO - Tom's Configuration

        ## Version: $VERSION

        This is an automated build of Tom's NixOS configuration as a Live ISO.

        ### Features
        - GNOME Desktop Environment
        - Colemak keyboard layout
        - Modern CLI tools (bat, eza, fd, ripgrep, etc.)
        - Development tools and utilities
        - NetworkManager for network configuration
        - Live user: \`tom\` (password: \`nixos\`)
        - Root access available (password: \`nixos\`)

        ### Size
        - ISO Size: ${{ env.iso_size }}

        ### Verification
        Use the provided checksums to verify the ISO integrity:
        - SHA256: See attached \`.sha256\` file
        - MD5: See attached \`.md5\` file

        ### Usage
        1. Download the ISO file
        2. Verify checksums (recommended)
        3. Flash to USB drive using tools like \`dd\`, Rufus, or Balena Etcher
        4. Boot from USB
        5. Login as \`tom\` with password \`nixos\`

        Built from commit: \`${{ github.sha }}\`
        EOF

    - name: Create Release
      if: github.event_name == 'workflow_dispatch' && inputs.release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "iso-${{ steps.version.outputs.version }}"
        name: "NixOS Live ISO ${{ steps.version.outputs.version }}"
        body_path: release_notes.md
        draft: false
        prerelease: false
        files: |
          ${{ env.iso_filename }}
          ${{ env.iso_filename }}.sha256
          ${{ env.iso_filename }}.md5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload ISO as artifact
      uses: actions/upload-artifact@v4
      with:
        name: "nixos-iso-${{ steps.version.outputs.version }}"
        path: |
          ${{ env.iso_filename }}
          ${{ env.iso_filename }}.sha256
          ${{ env.iso_filename }}.md5
        retention-days: 30
