name: NixOS Build (Final)

on:
  push:
    branches: [ main ]
    paths: [ '**.nix', 'flake.lock' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        system: [gti, transporter]

    name: ${{ matrix.system }}
    timeout-minutes: 60

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          logger: compact

      - name: Setup Magic Nix Cache (single cache layer)
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Configure Nix for CI performance
        run: |
          echo "Setting up optimized Nix configuration..."
          sudo mkdir -p /etc/nix
          echo "max-jobs = 2" | sudo tee -a /etc/nix/nix.conf
          echo "cores = 2" | sudo tee -a /etc/nix/nix.conf
          echo "substitute = true" | sudo tee -a /etc/nix/nix.conf
          echo "builders-use-substitutes = true" | sudo tee -a /etc/nix/nix.conf
          echo "http-connections = 25" | sudo tee -a /etc/nix/nix.conf
          echo "connect-timeout = 5" | sudo tee -a /etc/nix/nix.conf

      - name: Build ${{ matrix.system }}
        timeout-minutes: 50
        run: |
          echo "Building ${{ matrix.system }}..."

          # Build with optimized settings for CI
          nix build \
            ".#nixosConfigurations.${{ matrix.system }}.config.system.build.toplevel" \
            --print-build-logs \
            --verbose \
            --fallback \
            --keep-going \
            --option substitute true \
            --option max-jobs 2 \
            --option cores 2

          echo "✅ ${{ matrix.system }} built successfully"

      - name: Verify build
        run: |
          if [ -L result ]; then
            echo "✅ Build artifact exists"
            # Basic verification
            if [ -d "result/sw" ]; then
              echo "✅ Valid NixOS system structure"
            else
              echo "❌ Invalid system structure"
              exit 1
            fi
          else
            echo "❌ No build result"
            exit 1
          fi

      - name: Clean up
        if: always()
        run: |
          # Clean up to save space for next job
          nix-collect-garbage
          rm -f result
