name: Build NixOS Systems (Minimal)

on:
  push:
    branches: [ main ]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - '**.nix'
      - '.github/workflows/build-systems-minimal.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        system: [gti, transporter]

    name: Build ${{ matrix.system }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          logger: pretty

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        continue-on-error: true

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: nix-community
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: true

      - name: Temporarily remove problematic inputs
        run: |
          echo "Creating temporary flake.nix without problematic inputs..."
          # Create a backup
          cp flake.nix flake.nix.bak

          # Remove ghostty input which seems to cause store corruption
          sed -i '/# Ghostty terminal emulator/,+3d' flake.nix
          sed -i '/ghostty = {/,+2d' flake.nix

          # Also remove any other potentially problematic inputs
          echo "Modified flake.nix for CI compatibility"

      - name: Build ${{ matrix.system }}
        timeout-minutes: 45
        run: |
          echo "Building system: ${{ matrix.system }}"

          # Update the lock file after removing inputs
          nix flake update

          # Build the system
          nix build .#nixosConfigurations.${{ matrix.system }}.config.system.build.toplevel -L --show-trace
          echo "✅ System built successfully"

      - name: Test development shell
        timeout-minutes: 5
        run: |
          echo "Testing development shell..."
          nix develop -c echo "Development shell works!"
          echo "✅ Development shell tested successfully"
